name: Docker CI Pipeline
run-name: ${{ github.actor }} is running on Docker CI Pipeline
on : [push]
jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6
      
      - name: Run hadolint for dockrfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL4000

      - name: Docker Build
        run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/helloworld-python:v1 .

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
         username: ${{ vars.DOCKERHUB_USERNAME }}
         password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Push
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/helloworld-python:v1 

      - name: Run the container
        run: docker run --name helloworld-python -idt -p 8080:8080 ${{ vars.DOCKERHUB_USERNAME }}/helloworld-python:v1 

      - name: View the container
        run: docker ps
        
